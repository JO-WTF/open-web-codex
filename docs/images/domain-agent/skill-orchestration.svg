<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">供应链网络规划 Skill 编排</title>
  <desc id="desc">供应链网络规划依次完成需求基线、仓网选址、多层网络设计、仓网布局模拟、方案评估和统一校验。</desc>
  <defs>
    <style>
      text { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 650; }
      .box { fill: #ffffff; stroke: #5c75a5; stroke-width: 2; rx: 14; }
      .primary { fill: #e8f1ff; stroke: #4b79c9; }
      .final { fill: #eaf8f0; stroke: #3e9a68; }
      .arrow { stroke: #66758f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#66758f"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#f7f9fc"/>
  <text x="600" y="48" text-anchor="middle" class="title">供应链网络规划 Skill 编排</text>

  <rect x="390" y="75" width="420" height="64" class="box primary"/>
  <text x="600" y="114" text-anchor="middle" class="label">analyze-network-demand</text>

  <path d="M600 139 V175" class="arrow"/>
  <rect x="390" y="175" width="420" height="64" class="box"/>
  <text x="600" y="214" text-anchor="middle" class="label">plan-warehouse-locations</text>

  <path d="M600 239 V275" class="arrow"/>
  <rect x="390" y="275" width="420" height="64" class="box primary"/>
  <text x="600" y="314" text-anchor="middle" class="label">design-multi-echelon-network</text>

  <path d="M600 339 V375" class="arrow"/>
  <rect x="390" y="375" width="420" height="64" class="box primary"/>
  <text x="600" y="414" text-anchor="middle" class="label">simulate-warehouse-network</text>

  <path d="M600 439 V475" class="arrow"/>
  <rect x="390" y="475" width="420" height="64" class="box"/>
  <text x="600" y="514" text-anchor="middle" class="label">evaluate-network-scenarios</text>

  <path d="M600 539 V575" class="arrow"/>
  <rect x="390" y="575" width="420" height="64" class="box final"/>
  <text x="600" y="614" text-anchor="middle" class="label">validate-network-plan</text>
</svg>
