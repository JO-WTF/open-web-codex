<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">领域 Agent 总体逻辑分层</title>
  <desc id="desc">供应链网络规划任务进入 Codex Runtime，Runtime 编排由 Agent Profile、Domain Knowledge 和 Skills 组成的领域层，Skills 调用 MCP Servers 和外部工具。</desc>
  <defs>
    <style>
      text { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .title { font-size: 30px; font-weight: 700; }
      .label { font-size: 24px; font-weight: 700; }
      .body { font-size: 18px; fill: #46536b; }
      .small { font-size: 16px; fill: #58657a; }
      .box { stroke-width: 2; rx: 18; }
      .arrow { stroke: #66758f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#66758f"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="#f7f9fc"/>
  <text x="600" y="52" text-anchor="middle" class="title">领域 Agent 总体逻辑分层</text>

  <rect x="230" y="85" width="740" height="105" class="box" fill="#ffffff" stroke="#9aa7bc"/>
  <text x="600" y="125" text-anchor="middle" class="label">User Task</text>
  <text x="600" y="160" text-anchor="middle" class="body">例如：为华东地区规划五年期仓网与运输网络</text>

  <path d="M600 190 V235" class="arrow"/>
  <rect x="150" y="235" width="900" height="150" class="box" fill="#e8f1ff" stroke="#4b79c9"/>
  <text x="600" y="278" text-anchor="middle" class="label">Codex Runtime</text>
  <text x="600" y="316" text-anchor="middle" class="body">理解任务 · 读取上下文 · 生成计划 · 选择 Skills</text>
  <text x="600" y="348" text-anchor="middle" class="body">调用工具 · 管理执行过程 · 汇总结果</text>

  <path d="M600 385 V430" class="arrow"/>
  <rect x="80" y="430" width="1040" height="285" class="box" fill="#f0ecff" stroke="#7661c9"/>
  <text x="600" y="470" text-anchor="middle" class="label">Domain Agent Layer</text>
  <rect x="140" y="500" width="920" height="75" class="box" fill="#ffffff" stroke="#9383d2"/>
  <text x="600" y="531" text-anchor="middle" class="label">Agent Profile</text>
  <text x="600" y="558" text-anchor="middle" class="small">身份 · 职责 · 边界 · 原则 · 输出要求</text>
  <rect x="140" y="610" width="410" height="75" class="box" fill="#ffffff" stroke="#9383d2"/>
  <text x="345" y="640" text-anchor="middle" class="label">Domain Knowledge</text>
  <text x="345" y="669" text-anchor="middle" class="small">标准 · 规范 · 模板 · 项目上下文</text>
  <rect x="650" y="610" width="410" height="75" class="box" fill="#ffffff" stroke="#9383d2"/>
  <text x="855" y="640" text-anchor="middle" class="label">Skills</text>
  <text x="855" y="669" text-anchor="middle" class="small">方法 · 流程 · 校验 · 完成标准</text>

  <path d="M855 685 V760" class="arrow"/>
  <rect x="150" y="760" width="900" height="100" class="box" fill="#eaf8f0" stroke="#3e9a68"/>
  <text x="600" y="800" text-anchor="middle" class="label">MCP Servers / Tools</text>
  <text x="600" y="835" text-anchor="middle" class="body">ERP · WMS · Geo / Routing · Optimization · Simulation · Spreadsheet</text>
</svg>
