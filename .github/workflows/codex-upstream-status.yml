name: Codex upstream status

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Inspect upstream distance
        run: |
          output="$(./scripts/codex-upstream-status.sh)"
          printf '%s\n' "$output"
          {
            echo '## Codex upstream status'
            echo '```text'
            printf '%s\n' "$output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
