name: Web and contract checks

on:
  push:
    paths:
      - "apps/web/**"
      - "docs/**"
      - ".sync/**"
      - "scripts/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "docs/**"
      - ".sync/**"
      - "scripts/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check:codex-contracts
      - run: npm run check:codex-generated
      - run: npm run test:codex-capabilities
      - run: npm run test:feature-policy
      - run: npm run test:codex-fixtures
      - run: npm run test:codex-harness

  repository-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate shell and metadata
        run: |
          bash -n scripts/*.sh
          jq empty .sync/codex-upstream.json
          git diff --check HEAD^ -- . ':(exclude)**/*.snap'
