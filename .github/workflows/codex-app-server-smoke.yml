name: Codex App-Server Smoke

on:
  workflow_dispatch:
    inputs:
      codex_binary_url:
        description: HTTPS URL for the Codex app-server-capable binary
        required: true
        type: string
      codex_binary_sha256:
        description: Expected SHA-256 for the Codex binary
        required: true
        type: string
      contract_bundle_url:
        description: HTTPS URL for the matching Codex contract bundle
        required: true
        type: string
      contract_bundle_sha256:
        description: Expected SHA-256 for the contract bundle
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: codex-contract-smoke
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate immutable inputs
        env:
          CODEX_BINARY_URL: ${{ inputs.codex_binary_url }}
          CODEX_BINARY_SHA256: ${{ inputs.codex_binary_sha256 }}
          CONTRACT_BUNDLE_URL: ${{ inputs.contract_bundle_url }}
          CONTRACT_BUNDLE_SHA256: ${{ inputs.contract_bundle_sha256 }}
        run: |
          [[ "$CODEX_BINARY_URL" == https://* ]]
          [[ "$CONTRACT_BUNDLE_URL" == https://* ]]
          [[ "$CODEX_BINARY_SHA256" =~ ^[a-fA-F0-9]{64}$ ]]
          [[ "$CONTRACT_BUNDLE_SHA256" =~ ^[a-fA-F0-9]{64}$ ]]

      - name: Verify repository contract tests
        run: |
          npm run check:codex-contracts -- --base HEAD
          npm run test:codex-fixtures
          npm run test:codex-capabilities
          npm run test:codex-harness

      - name: Download and cache matching contract bundle
        env:
          CONTRACT_BUNDLE_URL: ${{ inputs.contract_bundle_url }}
          CONTRACT_BUNDLE_SHA256: ${{ inputs.contract_bundle_sha256 }}
        run: >-
          npm run fetch:codex-contracts --
          --source "$CONTRACT_BUNDLE_URL"
          --sha256 "$CONTRACT_BUNDLE_SHA256"

      - name: Download and verify Codex binary
        env:
          CODEX_BINARY_URL: ${{ inputs.codex_binary_url }}
          CODEX_BINARY_SHA256: ${{ inputs.codex_binary_sha256 }}
        run: |
          curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
            --output "$RUNNER_TEMP/codex" "$CODEX_BINARY_URL"
          echo "$CODEX_BINARY_SHA256  $RUNNER_TEMP/codex" | sha256sum --check --strict
          chmod 0500 "$RUNNER_TEMP/codex"

      - name: Run real app-server initialize smoke
        env:
          CODEX_BIN: ${{ runner.temp }}/codex
        run: npm run smoke:codex-app-server | tee codex-smoke-result.json

      - name: Upload smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: codex-app-server-smoke-result
          path: codex-smoke-result.json
          if-no-files-found: error
          retention-days: 14
